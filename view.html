<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>도영상담소 리포트 뷰어. 좋은하루 되세요 ^.^</title>
    <style>
        /* 배경색 설정: #191970 (Midnight Blue) */
        /* 글씨색 설정: white (하얀색) */
        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            background-color: #191970; 
            color: white; 
            min-height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
        }
        
        /* 이미지 상자 설정 */
        img { 
            max-width: 100%; 
            height: auto; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            margin-top: 20px;
        }

        .loading-text {
            margin-top: 50px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div id="statusMessage" class="loading-text">도영상담소 리포트를 불러오는 중입니다...</div>
    <img id="reportImage" src="" style="display: none;">

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let fileName = urlParams.get('file'); 
        
        const reportImg = document.getElementById('reportImage');
        const statusMsg = document.getElementById('statusMessage');

        if (fileName) {
            // 파일명에 확장자가 없으면 .png를 자동으로 붙여줌
            if (!fileName.includes('.')) {
                fileName += ".png";
            }
            
            const imagePath = "https://sajudy.github.io/saju/" + fileName;
            
            // 이미지 로딩 성공 시
            reportImg.onload = function() {
                statusMsg.style.display = 'none'; // 메시지 숨김
                reportImg.style.display = 'block'; // 이미지 표시
            };

            // 이미지 로딩 실패 시
            reportImg.onerror = function() {
                statusMsg.innerText = "이미지를 찾을 수 없습니다: " + fileName + "\n파일명 대소문자를 확인해 주세요.";
            };

            reportImg.src = imagePath;
        } else {
            statusMsg.innerText = "주소 뒤에 ?file=파일명 형식이 필요합니다.";
        }
    </script>
</body>
</html>
