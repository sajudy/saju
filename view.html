<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="도영상담소 리포트 뷰어">
    <meta property="og:description" content="좋은 하루 되세요 ^.^">
    <meta property="og:image" content="https://sajudy.github.io/saju/bg01.jpg"> 
    
    <title>도영상담소 리포트 뷰어</title>
    <style>
        /* 화면 전체 배경을 깊은 남색으로 고정 */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #191970 !important; 
            color: #ffffff !important; /* 글씨 하얀색 */
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Malgun Gothic', sans-serif;
        }
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        img { 
            max-width: 100%; 
            height: auto; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            margin-top: 10px;
            display: none; /* 로딩 전까지 숨김 */
        }
        .msg { margin-top: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div id="m" class="msg">도영 소장님의 리포트를 불러오는 중...</div>
        <img id="i">
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        let f = p.get('file');
        if(f) {
            if(!f.includes('.')) f += ".png";
            const img = document.getElementById('i');
            const msg = document.getElementById('m');
            
            img.onload = () => { 
                msg.style.display = 'none'; 
                img.style.display = 'block'; 
            };
            img.onerror = () => { 
                msg.innerText = "파일을 찾지 못했습니다: " + f; 
            };
            img.src = "https://kt7941.github.io/saju/" + f;
        } else {
            document.getElementById('m').innerText = "파일 이름을 확인해주세요.";
        }
    </script>
</body>
</html>
